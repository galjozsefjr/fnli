version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: fnli-db
    restart: always
    environment:
      - POSTGRES_USER=${DATABASE_USERNAME}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=fnli
      - PGDATA=/data/postgres
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    networks:
      - app
  redis:
    container_name: redis_queues
    image: redis:8.6.1-alpine
    restart: always
    ports:
      - '6379:6379'
    networks:
      - app
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: fnli-be
    environment:
      - PORT=3001
      - DATABASE_USERNAME=${DATABASE_USERNAME}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=fnli
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - JWT_TOKEN_SECRET=${JWT_TOKEN_SECRET}
      - REDIS_PORT=6379
      - REDIS_HOST=redis
    ports:
      - '3001:3001'
    volumes:
      - /app/api/node_modules
    depends_on:
      - db
      - redis
    networks:
      - app
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: fnli-fe
    environment:
      - PORT=3000
    volumes:
      - /app/web/node_modules
    depends_on:
      - api
    networks:
      - app
  nginx:
    container_name: nginx
    image: nginx:1.19-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./api:/app/api
      - ./web:/app/web
      - ./apps/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    networks:
      - app
networks:
  app:
    driver: bridge